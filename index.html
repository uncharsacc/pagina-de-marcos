<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Lentes - José</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            background: #fff;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Categorías */
        .titulo-categoria {
            margin: 40px 0 20px;
            padding-left: 15px;
            border-left: 6px solid #3498db;
            font-size: 1.8rem;
            color: #2c3e50;
            background: rgba(52, 152, 219, 0.05);
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 0 10px 10px 0;
        }

        /* Grid de Marcas */
        .grid-marcas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .cuadrado-marca {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #eee;
        }

        .cuadrado-marca:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
            border-color: #3498db;
        }

        .espacio-imagen {
            width: 100%;
            height: 180px;
            background-color: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            color: #bdc3c7;
            font-size: 0.9rem;
        }

        .nombre-marca {
            font-size: 1.2rem;
            font-weight: bold;
            color: #34495e;
        }

        /* Vista de Imágenes (Galería interna) */
        #vistaImagenes {
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header-imagenes {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            position: sticky;
            top: 10px;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-volver {
            padding: 12px 25px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-volver:hover {
            background-color: #34495e;
        }

        .grid-imagenes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .cuadrado-imagen {
            background: white;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .contenedor-imagen {
            width: 100%;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 8px;
            background: #f9f9f9;
        }

        .imagen-preview {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s;
        }

        .cuadrado-imagen:hover .imagen-preview {
            transform: scale(1.1);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 2000;
            cursor: zoom-out;
        }

        .modal-contenido {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
        }

        .modal img {
            max-width: 95%;
            max-height: 95%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border-radius: 5px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .grid-marcas { grid-template-columns: 1fr; }
            .header-imagenes { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="vistaMarcas">
        <header>
            <h1>👓 Catálogo de Lentes</h1>
            <p>Selecciona una marca para ver los modelos disponibles</p>
        </header>
        <div id="contenedorCategorias"></div>
    </div>

    <div id="vistaImagenes">
        <div class="header-imagenes">
            <button class="btn-volver" onclick="volverAMarcas()">← Volver al Menú</button>
            <h2 id="tituloCarpetaActual" class="titulo-carpeta"></h2>
        </div>
        <div id="gridImagenes" class="grid-imagenes"></div>
    </div>

    <div id="modal" class="modal" onclick="cerrarModal()">
        <div class="modal-contenido">
            <img id="modalImg" src="">
        </div>
    </div>
</div>

<script src="datos-imagenes.js"></script>
<script src="datos-logos.js"></script>

<script>
    let posicionScrollPrincipal = 0
    // 1. ORGANIZACIÓN POR CATEGORÍAS
    // Aquí puedes mover las marcas a la categoría que quieras
    const categorias = {
        "ECONOMICOS": [
            { nombre: "GATTIZONI", portada: "" },
            { nombre: "GEORGE", portada: "" },
            { nombre: "JORGIO", portada: "" },
            { nombre: "LE GIRO", portada: "" }
        ],
        "MEDIA": [
            { nombre: "ANGELO FALCONI", portada: "" },
            { nombre: "LINEA VIGO", portada: "" }, // Vigo Plástico
            { nombre: "JEAN DE PARIS", portada: "" },
            { nombre: "FOOSE", portada: "" },
            { nombre: "VESPA DEPORTIVO", portada: "" },
            { nombre: "VESPA", portada: "" }, // Vespa Plástico/Metálico
            { nombre: "LUXOR", portada: "" }
        ],
        "PREMIUM": [
            { nombre: "LINEA VIGO", portada: "" }, // Vigo Metálico
            { nombre: "GAME DAY", portada: "" },
            { nombre: "MAXCOME", portada: "" },
            { nombre: "SILMO", portada: "" },
            { nombre: "SILMO ÓPTICO", portada: "" },
            { nombre: "SILMO SOBRELENTE", portada: "" },
            { nombre: "LINEA VIGO SOBRELENTE", portada: "" },
            { nombre: "POLO", portada: "" }
        ],
        "SOL": [
            { nombre: "VESPA SOL", portada: "" },
            { nombre: "LACROSSE SOL", portada: "" },
            { nombre: "ICE LOOK SOL", portada: "" },
            { nombre: "SILMO SOL", portada: "" }
        ],
        "NIÑOS": [
            { nombre: "VESPA KIDS", portada: "" },
            { nombre: "VESPA KIDS SOL", portada: "" },
            { nombre: "MOODKIDS", portada: "" },
            { nombre: "MOODKIDS SOBRELENTE", portada: "" },
            { nombre: "FOOSE", portada: "" }, // Foose TR90
            { nombre: "VESPA PEBAX KIDS", portada: "" }
        ],
        "SEGURIDAD Y ANTIPARRA": [
            { nombre: "LENTE Y ANTIPARRA DE SEGURIDAD", portada: "" }
        ]
    };

    function inicializarCatalogo() {
        const contenedor = document.getElementById('contenedorCategorias');
        contenedor.innerHTML = '';

        for (const [nombreCat, marcas] of Object.entries(categorias)) {
            // Crear el encabezado de la categoría (ECONÓMICOS, MEDIA, etc.)
            const seccion = document.createElement('section');
            seccion.innerHTML = `<h2 class="titulo-categoria">${nombreCat}</h2>`;
            
            const grid = document.createElement('div');
            grid.className = 'grid-marcas';

            marcas.forEach(marca => {
                const card = document.createElement('div');
                card.className = 'cuadrado-marca';
                
                // BUSQUEDA AUTOMÁTICA: 
                // mapaLogos viene del archivo datos-logos.js
                const urlLogo = mapaLogos[marca.nombre] || '';

                card.innerHTML = `
                    <div class="espacio-imagen" style="${urlLogo ? 
                        `background-image: url('${encodeURI(urlLogo)}'); 
                        border:none; 
                        background-size: contain; 
                        background-repeat: no-repeat; 
                        background-color: white;` : ''}">
                        ${!urlLogo ? '📷 Sin Logo' : ''}
                    </div>
                    <div class="nombre-marca">${marca.nombre}</div>
                `;
                
                card.onclick = () => verMarca(marca.nombre);
                grid.appendChild(card);
            });

            seccion.appendChild(grid);
            contenedor.appendChild(seccion);
        }
    }

    function verMarca(nombreMarca) {
        document.getElementById('tituloCarpetaActual').textContent = nombreMarca;
        document.getElementById('vistaMarcas').style.display = 'none';
        document.getElementById('vistaImagenes').style.display = 'block';
        window.scrollTo(0, 0);

        const grid = document.getElementById('gridImagenes');
        grid.innerHTML = '';

        // Obtenemos las fotos del archivo datos-imagenes.js
        const fotos = catalogoImagenes[nombreMarca] || [];

        if (fotos.length === 0) {
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center;">No hay fotos en esta carpeta aún.</p>';
            return;
        }

        fotos.forEach(foto => {
            const url = `imagenes/${nombreMarca}/${foto}`;
            const div = document.createElement('div');
            div.className = 'cuadrado-imagen';
            div.innerHTML = `
                <div class="contenedor-imagen">
                    <img src="${encodeURI(url)}" class="imagen-preview">
                </div>
                <div class="nombre-imagen">${foto}</div>
            `;
            div.onclick = () => abrirModal(encodeURI(url));
            grid.appendChild(div);
        });
    }

    function volverAMarcas() {
        document.getElementById('vistaMarcas').style.display = 'block';
        document.getElementById('vistaImagenes').style.display = 'none';
        
        // Regresar a la posición exacta donde estaba el usuario
        setTimeout(() => {
            window.scrollTo(0, posicionScrollPrincipal);
        }, 10);
    }

    function abrirModal(url) {
        document.getElementById('modalImg').src = url;
        document.getElementById('modal').style.display = 'block';
    }

    function cerrarModal() {
        document.getElementById('modal').style.display = 'none';
    }

    // Arrancar la página
    document.addEventListener('DOMContentLoaded', inicializarCatalogo);
</script>

</body>
</html>
