<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Lentes - sacc & vision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            background: #fff;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Buscador */
        #buscador {
            margin: 20px auto;
            max-width: 500px;
            position: relative;
        }

        #buscador input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #3498db;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
        }

        #buscador input:focus {
            border-color: #2980b9;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }

        .resultados-busqueda {
            display: none;
            margin: 30px 0;
        }

        /* Resto de estilos (sin cambios) */
        .titulo-categoria { margin: 40px 0 20px; padding-left: 15px; border-left: 6px solid #3498db; font-size: 1.8rem; color: #2c3e50; background: rgba(52, 152, 219, 0.05); padding-top: 10px; padding-bottom: 10px; border-radius: 0 10px 10px 0; }

        .grid-marcas, .grid-imagenes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .cuadrado-marca, .cuadrado-imagen {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cuadrado-marca:hover, .cuadrado-imagen:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }

        .precio-marca {
            margin-top: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #27ae60;
        }

        .categoria-marca {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="vistaMarcas">
        <header>
            <h1>👓 Catálogo de Lentes</h1>
            <h1>sacc & vision</h1>
            <p>Selecciona una marca o usa el buscador</p>
            
            <!-- BUSCADOR -->
            <div id="buscador">
                <input type="text" id="inputBusqueda" placeholder="🔎 Buscar marca o modelo..." autocomplete="off">
            </div>
        </header>

        <div id="contenedorCategorias"></div>

        <!-- Resultados de búsqueda -->
        <div id="resultadosBusqueda" class="resultados-busqueda">
            <h2 class="titulo-categoria">Resultados de búsqueda</h2>
            <div id="gridResultados" class="grid-marcas"></div>
        </div>
    </div>

    <!-- Vista de imágenes (sin cambios) -->
    <div id="vistaImagenes" style="display:none;">
        <div class="header-imagenes">
            <button class="btn-volver" onclick="volverAMarcas()">← Volver al Menú</button>
            <h2 id="tituloCarpetaActual" class="titulo-carpeta"></h2>
        </div>
        <div id="gridImagenes" class="grid-imagenes"></div>
    </div>

    <div id="modal" class="modal" onclick="cerrarModal()">
        <div class="modal-contenido">
            <img id="modalImg" src="">
        </div>
    </div>
</div>

<script src="datos-imagenes.js"></script>
<script src="datos-logos.js"></script>

<script>
    let posicionScrollPrincipal = 0;

    const categorias = { /* ... tu objeto de categorías sin cambios ... */ 
        "ECONOMICOS": [
            { nombre: "GATTIZONI", portada: "", precio: 10000},
            { nombre: "GEORGE", portada: "" , precio: 10000},
            { nombre: "JORGIO", portada: "" , precio: 10000},
            { nombre: "LE GIRO", portada: "" , precio: 10000}
        ],
        "MEDIA": [
            { nombre: "ANGELO FALCONI", portada: "", precio: 24000 },
            { nombre: "JEAN DE PARIS", portada: "", precio: 24000 },
            { nombre: "FOOSE", portada: "", precio: 38000 },
            { nombre: "VESPA DEPORTIVO", portada: "" , precio: 28600},
            { nombre: "VESPA", portada: "" , precio: 30500, precioMax:38000},
            { nombre: "LUXOR", portada: "" , precio: 35700}
        ],
        "PREMIUM": [
            { nombre: "LINEA VIGO", portada: "", precio: 42900 },
            { nombre: "GAME DAY", portada: "" , precio: 48200},
            { nombre: "MAXCOME", portada: "", precio: 46400 },
            { nombre: "SILMO", portada: "" , precio: 44000},
            { nombre: "SILMO ÓPTICO", portada: "" , precio: 44000},
            { nombre: "SILMO SOBRELENTE", portada: "" , precio: 51200},
            { nombre: "LINEA VIGO SOBRELENTE", portada: "", precio: 46400 },
            { nombre: "POLO", portada: "" , precio: 47600}
        ],
        "SOL": [
            { nombre: "VESPA SOL", portada: "" , precio: 35700},
            { nombre: "LACROSSE SOL", portada: "" , precio: 46400},
            { nombre: "ICE LOOK SOL", portada: "" , precio: 53600},
            { nombre: "SILMO SOL", portada: "", precio: 40500 }
        ],
        "NIÑOS": [
            { nombre: "VESPA KIDS", portada: "" , precio: 16700},
            { nombre: "VESPA KIDS SOL", portada: "" , precio: 24990},
            { nombre: "MOODKIDS", portada: "", precio: 35700 },
            { nombre: "MOODKIDS SOBRELENTE", portada: "" , precio: 35700},
            { nombre: "FOOSE", portada: "", precio: 16700 },
            { nombre: "VESPA PEBAX KIDS", portada: "", precio: 44000 }
        ],
        "SEGURIDAD Y ANTIPARRA": [
            { nombre: "LENTE Y ANTIPARRA DE SEGURIDAD", portada: "", precio: 7500 , precioMax:27500 }
        ]
    };

    // Función para crear tarjeta de marca
    function crearTarjetaMarca(marca, categoria) {
        const card = document.createElement('div');
        card.className = 'cuadrado-marca';
        
        const urlLogo = mapaLogos[marca.nombre] || '';

        card.innerHTML = `
            <div class="espacio-imagen" style="${urlLogo ? 
                `background-image: url('${encodeURI(urlLogo)}'); border:none; background-size: contain; background-repeat: no-repeat; background-color: white;` : ''}">
                ${!urlLogo ? '📷 Sin Logo' : ''}
            </div>
            <div class="nombre-marca">${marca.nombre}</div>
            <div class="categoria-marca">${categoria}</div>
            <div class="precio-marca">
                \[ {marca.precio.toLocaleString('es-CL')}
                ${marca.precioMax ? ` - \]{marca.precioMax.toLocaleString('es-CL')}` : ''} CLP
            </div>
        `;
        
        card.onclick = () => verMarca(marca.nombre);
        return card;
    }

    function inicializarCatalogo() {
        const contenedor = document.getElementById('contenedorCategorias');
        contenedor.innerHTML = '';

        for (const [nombreCat, marcas] of Object.entries(categorias)) {
            const seccion = document.createElement('section');
            seccion.innerHTML = `<h2 class="titulo-categoria">${nombreCat}</h2>`;
            
            const grid = document.createElement('div');
            grid.className = 'grid-marcas';

            marcas.forEach(marca => {
                grid.appendChild(crearTarjetaMarca(marca, nombreCat));
            });

            seccion.appendChild(grid);
            contenedor.appendChild(seccion);
        }
    }

    // ===================== BUSCADOR =====================
    function filtrarMarcas(termino) {
        termino = termino.toLowerCase().trim();
        const gridResultados = document.getElementById('gridResultados');
        const resultadosContainer = document.getElementById('resultadosBusqueda');
        gridResultados.innerHTML = '';

        if (termino === '') {
            resultadosContainer.style.display = 'none';
            return;
        }

        let encontrados = 0;

        for (const [categoria, marcas] of Object.entries(categorias)) {
            marcas.forEach(marca => {
                if (marca.nombre.toLowerCase().includes(termino)) {
                    gridResultados.appendChild(crearTarjetaMarca(marca, categoria));
                    encontrados++;
                }
            });
        }

        if (encontrados > 0) {
            resultadosContainer.style.display = 'block';
        } else {
            gridResultados.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:30px;">No se encontraron resultados para "<strong>${termino}</strong>"</p>`;
            resultadosContainer.style.display = 'block';
        }
    }

    // Eventos del buscador
    document.addEventListener('DOMContentLoaded', () => {
        inicializarCatalogo();

        const input = document.getElementById('inputBusqueda');
        
        input.addEventListener('input', () => {
            filtrarMarcas(input.value);
        });

        // Buscar también al presionar Enter
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                filtrarMarcas(input.value);
            }
        });
    });

    // Funciones originales (sin cambios)
    function verMarca(nombreMarca) {
        posicionScrollPrincipal = window.scrollY;
        document.getElementById('tituloCarpetaActual').textContent = nombreMarca;
        document.getElementById('vistaMarcas').style.display = 'none';
        document.getElementById('vistaImagenes').style.display = 'block';
        window.scrollTo(0, 0);

        const grid = document.getElementById('gridImagenes');
        grid.innerHTML = '';

        const fotos = catalogoImagenes[nombreMarca] || [];
        if (fotos.length === 0) {
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center;">No hay fotos en esta carpeta aún.</p>';
            return;
        }

        fotos.forEach(foto => {
            const url = `imagenes/\( {nombreMarca}/ \){foto}`;
            const div = document.createElement('div');
            div.className = 'cuadrado-imagen';
            div.innerHTML = `
                <div class="contenedor-imagen">
                    <img src="${encodeURI(url)}" class="imagen-preview">
                </div>
                <div class="nombre-imagen">${foto}</div>
            `;
            div.onclick = () => abrirModal(encodeURI(url));
            grid.appendChild(div);
        });
    }

    function volverAMarcas() {
        document.getElementById('vistaMarcas').style.display = 'block';
        document.getElementById('vistaImagenes').style.display = 'none';
        setTimeout(() => window.scrollTo(0, posicionScrollPrincipal), 10);
    }

    function abrirModal(url) {
        document.getElementById('modalImg').src = url;
        document.getElementById('modal').style.display = 'block';
    }

    function cerrarModal() {
        document.getElementById('modal').style.display = 'none';
    }
</script>

</body>
</html>
