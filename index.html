
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Lentes - sacc & vision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            background: #fff;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* BUSCADOR */
        .buscador {
            text-align: center;
            margin: 20px 0;
        }

        .buscador input {
            padding: 12px;
            width: 60%;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #resultadoBusqueda {
            text-align: center;
            margin-top: 10px;
        }

        .resultado-item {
            background: white;
            margin: 10px auto;
            padding: 15px;
            border-radius: 10px;
            width: 80%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Categorías */
        .titulo-categoria {
            margin: 40px 0 20px;
            padding-left: 15px;
            border-left: 6px solid #3498db;
            font-size: 1.8rem;
            color: #2c3e50;
            background: rgba(52, 152, 219, 0.05);
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 0 10px 10px 0;
        }

        /* Grid de Marcas */
        .grid-marcas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }
        .precio-marca {
            margin-top: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #27ae60;
        }

        .cuadrado-marca {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #eee;
        }

        .cuadrado-marca:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
            border-color: #3498db;
        }

        .espacio-imagen {
            width: 100%;
            height: 180px;
            background-color: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            color: #bdc3c7;
            font-size: 0.9rem;
        }

        .nombre-marca {
            font-size: 1.2rem;
            font-weight: bold;
            color: #34495e;
        }

        /* Vista de Imágenes */
        #vistaImagenes {
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header-imagenes {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            position: sticky;
            top: 10px;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-volver {
            padding: 12px 25px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .grid-imagenes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .cuadrado-imagen {
            background: white;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .contenedor-imagen {
            width: 100%;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .imagen-preview {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-contenido {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .modal img {
            max-width: 95%;
            max-height: 95%;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="vistaMarcas">
        <header>
            <h1>👓 Catálogo de Lentes</h1>
            <h1>sacc & vision</h1>
            <p>Selecciona una marca para ver los modelos disponibles</p>
        </header>

        <!-- BUSCADOR -->
        <div class="buscador">
            <input type="text" id="buscador" placeholder="Buscar marca..." oninput="buscarMarca()">
        </div>
        <div id="resultadoBusqueda"></div>

        <div id="contenedorCategorias"></div>
    </div>

    <div id="vistaImagenes">
        <div class="header-imagenes">
            <button class="btn-volver" onclick="volverAMarcas()">← Volver al Menú</button>
            <h2 id="tituloCarpetaActual"></h2>
        </div>
        <div id="gridImagenes" class="grid-imagenes"></div>
    </div>

    <div id="modal" class="modal" onclick="cerrarModal()">
        <div class="modal-contenido">
            <img id="modalImg" src="">
        </div>
    </div>
</div>

<script src="datos-imagenes.js"></script>
<script src="datos-logos.js"></script>

<script>
let posicionScrollPrincipal = 0

const categorias = {
        "ECONOMICOS": [
            { nombre: "GATTIZONI", portada: "", precio: 10000},
            { nombre: "GEORGE", portada: "" , precio: 10000},
            { nombre: "JORGIO", portada: "" , precio: 10000},
            { nombre: "LE GIRO", portada: "" , precio: 10000}
        ],
        "MEDIA": [
            { nombre: "ANGELO FALCONI", portada: "", precio: 24000 },
            { nombre: "JEAN DE PARIS", portada: "", precio: 24000 },
            { nombre: "FOOSE", portada: "", precio: 38000 },
            { nombre: "VESPA DEPORTIVO", portada: "" , precio: 28600},
            { nombre: "VESPA", portada: "" , precio: 30500, precioMax:38000}, // Vespa Plástico/Metálico
            { nombre: "LUXOR", portada: "" , precio: 35700}
        ],
        "PREMIUM": [
            { nombre: "LINEA VIGO", portada: "", precio: 42900 }, // Vigo Metálico
            { nombre: "GAME DAY", portada: "" , precio: 48200},
            { nombre: "MAXCOME", portada: "", precio: 46400 },
            { nombre: "SILMO", portada: "" , precio: 44000},
            { nombre: "SILMO ÓPTICO", portada: "" , precio: 44000},
            { nombre: "SILMO SOBRELENTE", portada: "" , precio: 51200},
            { nombre: "LINEA VIGO SOBRELENTE", portada: "", precio: 46400 },
            { nombre: "POLO", portada: "" , precio: 47600}
        ],
        "SOL": [
            { nombre: "VESPA SOL", portada: "" , precio: 35700},
            { nombre: "LACROSSE SOL", portada: "" , precio: 46400},
            { nombre: "ICE LOOK SOL", portada: "" , precio: 53600},
            { nombre: "SILMO SOL", portada: "", precio: 40500 }
        ],
        "NIÑOS": [
            { nombre: "VESPA KIDS", portada: "" , precio: 16700},
            { nombre: "VESPA KIDS SOL", portada: "" , precio: 24990},
            { nombre: "MOODKIDS", portada: "", precio: 35700 },
            { nombre: "MOODKIDS SOBRELENTE", portada: "" , precio: 35700},
            { nombre: "FOOSE", portada: "", precio: 16700 }, // Foose TR90
            { nombre: "VESPA PEBAX KIDS", portada: "", precio: 44000 }
        ],
        "SEGURIDAD Y ANTIPARRA": [
            { nombre: "LENTE Y ANTIPARRA DE SEGURIDAD", portada: "", precio: 7500 , precioMax:27500 }
        ]
    };

function inicializarCatalogo() {
    const contenedor = document.getElementById('contenedorCategorias');
    contenedor.innerHTML = '';

    for (const [nombreCat, marcas] of Object.entries(categorias)) {
        const seccion = document.createElement('section');
        seccion.innerHTML = `<h2 class="titulo-categoria">${nombreCat}</h2>`;
        
        const grid = document.createElement('div');
        grid.className = 'grid-marcas';

        marcas.forEach(marca => {
            const card = document.createElement('div');
            card.className = 'cuadrado-marca';

            const urlLogo = mapaLogos[marca.nombre] || '';

            card.innerHTML = `
                <div class="espacio-imagen" style="${urlLogo ? 
                    `background-image: url('${encodeURI(urlLogo)}'); 
                    background-size: contain; 
                    background-repeat: no-repeat; 
                    background-color: white;` : ''}">
                    ${!urlLogo ? '📷 Sin Logo' : ''}
                </div>
                <div class="nombre-marca">${marca.nombre}</div>
                <div class="precio-marca">
                    $${marca.precio.toLocaleString('es-CL')} CLP
                </div>
            `;
            
            card.onclick = () => verMarca(marca.nombre);
            grid.appendChild(card);
        });

        seccion.appendChild(grid);
        contenedor.appendChild(seccion);
    }
}

/* 🔍 BUSCADOR */
function buscarMarca() {
    const texto = document.getElementById("buscador").value.toLowerCase();
    const resultadoDiv = document.getElementById("resultadoBusqueda");

    if (texto.trim() === "") {
        resultadoDiv.innerHTML = "";
        return;
    }

    let resultados = [];

    for (const [categoria, marcas] of Object.entries(categorias)) {
        marcas.forEach(marca => {
            if (marca.nombre.toLowerCase().includes(texto)) {
                resultados.push({
                    nombre: marca.nombre,
                    categoria: categoria,
                    precio: marca.precio,
                    precioMax: marca.precioMax
                });
            }
        });
    }

    if (resultados.length === 0) {
        resultadoDiv.innerHTML = "<p>No se encontraron resultados</p>";
        return;
    }

    resultadoDiv.innerHTML = resultados.map(m => `
        <div class="resultado-item">
            <strong>${m.nombre}</strong><br>
            Categoría: ${m.categoria}<br>
            Precio: $${m.precio.toLocaleString('es-CL')}
            ${m.precioMax ? ` - $${m.precioMax.toLocaleString('es-CL')}` : ''} CLP
        </div>
    `).join("");
}

function verMarca(nombreMarca) {
    posicionScrollPrincipal = window.scrollY;

    document.getElementById('tituloCarpetaActual').textContent = nombreMarca;
    document.getElementById('vistaMarcas').style.display = 'none';
    document.getElementById('vistaImagenes').style.display = 'block';
    window.scrollTo(0, 0);

    const grid = document.getElementById('gridImagenes');
    grid.innerHTML = '';

    const fotos = catalogoImagenes[nombreMarca] || [];

    if (fotos.length === 0) {
        grid.innerHTML = '<p>No hay fotos en esta carpeta aún.</p>';
        return;
    }

    fotos.forEach(foto => {
        const url = `imagenes/${nombreMarca}/${foto}`;
        const div = document.createElement('div');
        div.className = 'cuadrado-imagen';
        div.innerHTML = `
            <div class="contenedor-imagen">
                <img src="${encodeURI(url)}" class="imagen-preview">
            </div>
            <div>${foto}</div>
        `;
        div.onclick = () => abrirModal(encodeURI(url));
        grid.appendChild(div);
    });
}

function volverAMarcas() {
    document.getElementById('vistaMarcas').style.display = 'block';
    document.getElementById('vistaImagenes').style.display = 'none';
    setTimeout(() => window.scrollTo(0, posicionScrollPrincipal), 10);
}

function abrirModal(url) {
    document.getElementById('modalImg').src = url;
    document.getElementById('modal').style.display = 'block';
}

function cerrarModal() {
    document.getElementById('modal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', inicializarCatalogo);
</script>

</body>
</html>
